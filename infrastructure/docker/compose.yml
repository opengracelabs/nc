name: nature-culture

x-app-env: &app-env
  POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://nc:nc-dev-password@postgres:5432/nc}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ncadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ncadminpassword}
  MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-nc-raw}
  MINIO_BUCKET_NORMALIZED: ${MINIO_BUCKET_NORMALIZED:-nc-normalized}
  MINIO_BUCKET_CURATED: ${MINIO_BUCKET_CURATED:-nc-curated}

x-worker: &worker-defaults
  build:
    context: ../..
    dockerfile: infrastructure/docker/Dockerfile.worker
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
  networks:
    - backend

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nc}
      POSTGRES_USER: ${POSTGRES_USER:-nc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nc-dev-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nc} -d $${POSTGRES_DB:-nc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ncadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ncadminpassword}
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ncadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ncadminpassword}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-nc-raw}
      MINIO_BUCKET_NORMALIZED: ${MINIO_BUCKET_NORMALIZED:-nc-normalized}
      MINIO_BUCKET_CURATED: ${MINIO_BUCKET_CURATED:-nc-curated}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET_RAW}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET_NORMALIZED}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET_CURATED}"
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      NC_SECRET_KEY: ${NC_SECRET_KEY:-dev-secret}
      NC_ENV: ${NC_ENV:-development}
    ports:
      - "${API_PORT:-18000}:8000"
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-worker:
    <<: *worker-defaults
    restart: "no"
    command: ["python", "-m", "workers.discovery_worker.main", "--source", "unesco_whc"]
    environment:
      <<: *app-env
      WORKER_NAME: discovery_worker
      UNESCO_API_KEY: ${UNESCO_API_KEY:-}
      WIKIDATA_SPARQL_ENDPOINT: ${WIKIDATA_SPARQL_ENDPOINT:-https://query.wikidata.org/sparql}
      FETCH_TIMEOUT_SECONDS: ${FETCH_TIMEOUT_SECONDS:-60}
      DISCOVERY_AUTO_APPROVE: ${DISCOVERY_AUTO_APPROVE:-false}
      UNESCO_REPLAY_FIXTURE: ${UNESCO_REPLAY_FIXTURE:-/app/tests/fixtures/unesco_whc_50_sites.json}

  ingestion-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.ingestion_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: ingestion_worker
      UNESCO_API_KEY: ${UNESCO_API_KEY:-}
      UNESCO_REPLAY_FIXTURE: ${UNESCO_REPLAY_FIXTURE:-/app/tests/fixtures/unesco_whc_50_sites.json}
      WIKIMEDIA_USER_AGENT: ${WIKIMEDIA_USER_AGENT:-NatureAndCulture/1.0}
      FETCH_TIMEOUT_SECONDS: ${FETCH_TIMEOUT_SECONDS:-30}
      INGESTING_TIMEOUT_SECONDS: ${INGESTING_TIMEOUT_SECONDS:-900}

  preservation-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.preservation_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: preservation_worker
      BATCH_SIZE: ${PRESERVATION_BATCH_SIZE:-5}
      PRESERVATION_TIMEOUT_SECONDS: ${PRESERVATION_TIMEOUT_SECONDS:-300}

  knowledge-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.knowledge_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: knowledge_worker
      POLL_INTERVAL_SECONDS: ${KNOWLEDGE_POLL_INTERVAL_SECONDS:-30}

  taxon-discovery-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.taxon_discovery_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: taxon_discovery_worker
      POLL_INTERVAL_SECONDS: ${TAXON_DISCOVERY_POLL_INTERVAL_SECONDS:-30}
      TAXON_DISCOVERY_VERSION: ${TAXON_DISCOVERY_VERSION:-1}
      TAXON_DISCOVERY_TOP_LIMIT: ${TAXON_DISCOVERY_TOP_LIMIT:-50}
      GBIF_API_BASE_URL: ${GBIF_API_BASE_URL:-https://api.gbif.org/v1}
      WIKIDATA_SPARQL_ENDPOINT: ${WIKIDATA_SPARQL_ENDPOINT:-https://query.wikidata.org/sparql}

  research-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.research_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: research_worker
      POLL_INTERVAL_SECONDS: ${RESEARCH_POLL_INTERVAL_SECONDS:-30}
      RESEARCH_VERSION: ${RESEARCH_VERSION:-1}
      RESEARCH_OUTPUT_TYPE: ${RESEARCH_OUTPUT_TYPE:-place_brief}

  illustration-opportunity-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.illustration_opportunity_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: illustration_opportunity_worker
      POLL_INTERVAL_SECONDS: ${ILLUSTRATION_OPPORTUNITY_POLL_INTERVAL_SECONDS:-30}
      BATCH_SIZE: ${ILLUSTRATION_OPPORTUNITY_BATCH_SIZE:-10}
      BHL_API_BASE_URL: ${BHL_API_BASE_URL:-https://www.biodiversitylibrary.org/api3}
      BHL_API_KEY: ${BHL_API_KEY:-}

  bhl-asset-ingestion-worker:
    <<: *worker-defaults
    command: ["python", "-m", "workers.bhl_asset_ingestion_worker.main"]
    environment:
      <<: *app-env
      WORKER_NAME: bhl_asset_ingestion_worker
      POLL_INTERVAL_SECONDS: ${BHL_ASSET_INGESTION_POLL_INTERVAL_SECONDS:-30}
      BATCH_SIZE: ${BHL_ASSET_INGESTION_BATCH_SIZE:-5}
      BHL_PAGE_IMAGE_URL_TEMPLATE: ${BHL_PAGE_IMAGE_URL_TEMPLATE:-https://www.biodiversitylibrary.org/pageimage/{bhl_page_id}}
      FETCH_TIMEOUT_SECONDS: ${BHL_ASSET_FETCH_TIMEOUT_SECONDS:-60}
      FETCH_MAX_BYTES: ${BHL_ASSET_FETCH_MAX_BYTES:-52428800}

  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    profiles: ["optional"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-nc-dev-password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - backend

  mission-control:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mission_control
    restart: unless-stopped
    profiles: ["optional"]
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://nc:nc-dev-password@postgres:5432/nc}
      REDIS_URL: redis://redis:6379/0
      NC_API_URL: http://api:8000
      NC_SECRET_KEY: ${NC_SECRET_KEY:-dev-secret}
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    profiles: ["optional"]
    volumes:
      - ../../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    profiles: ["optional"]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nc-dev-password}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../observability/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../observability/alerts:/etc/grafana/provisioning/alerting:ro
    ports:
      - "3000:3000"
    networks:
      - backend
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
