name: nature-culture-graph

services:
  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-nc-dev-password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-nc-dev-password} 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  graph-loader:
    image: python:3.12-slim
    depends_on:
      neo4j:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app:ro
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-nc-dev-password}
      NEO4J_DATABASE: neo4j
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir 'neo4j>=5.27,<6'
        python -m graph.sync.sync_seed
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
